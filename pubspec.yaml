name: sky_crew
description: SkyCrew - Professional Flight Crew Management Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Database — works on web (IndexedDB) AND native (file)
  sembast: ^3.7.2
  sembast_web: ^2.4.0+2
  path: ^1.9.0          # used by native DB factory
  path_provider: ^2.1.2  # used by native DB factory

  # Export
  pdf: ^3.10.8
  csv: ^6.0.0
  share_plus: ^10.0.0    # web-compatible (uses Web Share API)
  # open_filex removed — not supported on web

  # Charts
  fl_chart: ^0.68.0

  # Crypto (password hashing)
  crypto: ^3.0.3

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.0
  google_fonts: ^6.2.1

  # Firebase (uncomment after running `flutterfire configure`)
  # firebase_core: ^3.3.0
  # firebase_auth: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
